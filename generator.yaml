ignore:
  resource_names: []
  field_paths:
    - CreateClusterInput.BypassPolicyLockoutSafetyCheck
    - CreateClusterInput.Policy

resources:
  Cluster:
    ignore_idempotency_token: true
    print:
      order_by: index
      additional_columns:
        - name: ENDPOINT
          json_path: .status.endpoint
          type: string
          index: 0
        - name: ID
          json_path: .status.identifier
          type: string
          index: 1
        - name: STATUS
          json_path: .status.status
          type: string
          index: 2
    fields:
      Identifier:
        is_primary_key: true
        is_read_only: true
      Policy:
        type: string
      Endpoint:
        is_read_only: true
        from:
          operation: GetCluster
          path: Endpoint
      EncryptionDetails:
        is_read_only: true
        from:
          operation: GetCluster
          path: EncryptionDetails
      CreationTime:
        is_read_only: true
        from:
          operation: GetCluster
          path: CreationTime
      Status:
        is_read_only: true
        from:
          operation: GetCluster
          path: Status
      ARN:
        is_read_only: true
        from:
          operation: GetCluster
          path: Arn
      KMSEncryptionKey:
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
      Tags:
        compare:
          is_ignored: true
    hooks:
      sdk_create_post_set_output:
        template_path: hooks/cluster/sdk_create_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/cluster/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/cluster/sdk_update_pre_build_request.go.tpl
      sdk_delete_pre_build_request:
        template_path: hooks/cluster/sdk_delete_pre_build_request.go.tpl
    exceptions:
      terminal_codes:
        - ValidationException
        - AccessDeniedException
        - ServiceQuotaExceededException
